  <style>
    *, *::before, *::after { box-sizing: border-box; }

      -webkit-text-fill-color: transparent;

    .iridescent-text {
      background: linear-gradient(90deg, #00F5D4, #9B5DE5, #F15BB5, #FEE440, #00F5D4);

      width: 72px; height: 86px; background: #050505;
      border-radius: 8px 8px 22px 22px; position: relative;
      box-shadow: 0 12px 28px rgba(0,0,0,0.45); flex-shrink: 0;

/* ═══════════════════════════════════════════════════════
   DIRECTION 05 — THE SUNSET ARCHIVE LOGO
   Circular disc · diagonal gradient (Sunset Orange →
   Electric Pink → UV-Purple @64% → Iridescent Cyan) ·
   1.5px white hairline inner ring · radial lens overlay ·
   oversized high-contrast white serif "E"
═══════════════════════════════════════════════════════ */
const SunsetArchiveLogo = ({ size = 42, placement = 'default' }) => {
  // Inline defs per instance — avoids cross-SVG ID conflicts
  const gid  = `sa-disc-${size}-${placement}`;
  const lid  = `sa-lens-${size}-${placement}`;
  return (
    <div style={{ width: size, height: size, flexShrink: 0,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
      <svg viewBox="0 0 100 100" width={size} height={size}
           xmlns="http://www.w3.org/2000/svg" style={{ overflow: 'hidden', borderRadius: '50%' }}>
        <defs>
          {/* Diagonal gradient: Sunset Orange → Electric Pink → UV-Purple @64% → Cyan */}
          <linearGradient id={gid} x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%"   stopColor="#FF6B35" />
            <stop offset="32%"  stopColor="#F15BB5" />
            <stop offset="64%"  stopColor="#9B5DE5" />
            <stop offset="100%" stopColor="#00F5D4" />
          </linearGradient>
          {/* Radial lens overlay — curved physical-disc illusion */}
          <radialGradient id={lid} cx="36%" cy="34%" r="68%">
            <stop offset="0%"   stopColor="white"  stopOpacity="0.28" />
            <stop offset="45%"  stopColor="white"  stopOpacity="0.05" />
            <stop offset="100%" stopColor="black"  stopOpacity="0.22" />
          </radialGradient>
        </defs>

        {/* Disc fill */}
        <circle cx="50" cy="50" r="50" fill={`url(#${gid})`} />

        {/* White hairline inner ring (1.5px) — prevents colour bleed at edge */}
        <circle cx="50" cy="50" r="47.5" fill="none" stroke="white" strokeWidth="1.5" opacity="0.55" />

        {/* Radial lens overlay */}
        <circle cx="50" cy="50" r="50" fill={`url(#${lid})`} />

        {/* Oversized high-contrast white serif "E" */}
        <text x="50" y="64" textAnchor="middle"
          fontFamily="'Playfair Display', Georgia, serif"
          fontStyle="italic" fontWeight="700"
          fontSize="54" fill="white"
          style={{ filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.35))' }}>E</text>
      </svg>
    </div>
  );
};

            <SunsetArchiveLogo size={30} placement="sidebar-hdr" />
            <span className="font-black text-sm tracking-tighter">
              endgame<span style={{ color: '#FF6B35' }}>.</span>archive
            </span>
