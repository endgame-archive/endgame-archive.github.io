      theme: {
        extend: {
          colors: {
            cyan: '#00F5D4',
            pink: '#F15BB5',
            uv: '#9B5DE5',
            yellow: '#FEE440',
            sunset: '#FF6B35',
            abyss: '#050505',
            pearl: '#F8F9FF',

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* ── Safe-area vars ── */
    :root {
      --sp-l: max(16px, env(safe-area-inset-left));
      --sp-r: max(16px, env(safe-area-inset-right));
    }
    .page-px {
      padding-left: var(--sp-l);
      padding-right: var(--sp-r);
    }

    /* ── Glass ── */
    .glass {
      background: rgba(248,249,255,0.10);
      backdrop-filter: blur(35px);
      -webkit-backdrop-filter: blur(35px);
      border: 2px solid rgba(155,93,229,0.30);
      border-radius: 24px;
      transition: box-shadow 0.35s ease, transform 0.35s ease;
    }
    .glass-dark {
      background: rgba(5,5,5,0.93);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
    }

    /* ── Sunset Archive gradient button ── */
    .btn-sunset {
      background: linear-gradient(135deg, #FF6B35 0%, #F15BB5 45%, #9B5DE5 100%);
      color: white;
      transition: opacity 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .btn-sunset:hover {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(255,107,53,0.40);
    }

    /* ── Sunset text gradient ── */
    .sunset-text {
      background: linear-gradient(90deg, #FF6B35, #F15BB5, #9B5DE5, #00F5D4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: flow 5s linear infinite;
    }

    /* ── Iridescent text ── */
    .iridescent-text {
      background: linear-gradient(90deg, #00F5D4, #9B5DE5, #F15BB5, #FEE440, #00F5D4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: flow 6s linear infinite;
    }

    @keyframes flow { to { background-position: 200% center; } }

    /* ── Ooze blobs ── */
    .ooze-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
    }

    /* ── Pearl overlay shimmer ── */
    .pearl-overlay {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: linear-gradient(105deg, transparent 0%, rgba(248,249,255,0.05) 25%, rgba(155,93,229,0.06) 40%, transparent 100%);
      background-size: 300% 300%;
      animation: shimmer 12s ease infinite;
    }

    /* ── Vault Sidebar (FIXED selector) ── */
    .vault-sidebar {
      position: fixed; top: 0; left: 0; height: 100%; width: 280px;
      z-index: 400; display: flex; flex-direction: column;
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    .vault-sidebar.closed { transform: translateX(-100%); }
    .vault-sidebar.open   { transform: translateX(0); }

    /* ── Mock product visuals ── */
    .mock-hoodie {
      width: 72px; height: 86px;
      background: #050505;
      border-radius: 8px 8px 22px 22px;
      position: relative;
      box-shadow: 0 12px 28px rgba(0,0,0,0.45);
      flex-shrink: 0;
    }
    .mock-hoodie::before {
      content: ''; position: absolute;
      top: -12px; left: 8px; width: 56px; height: 28px;
      background: #050505; border-radius: 50% 50% 0 0;
    }
    .mock-mat {
      width: 140px; height: 56px;
      background: linear-gradient(135deg, #9B5DE5, #00F5D4);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 6px 20px rgba(155,93,229,0.5);
      flex-shrink: 0;
    }
    .mock-plush {
      width: 60px; height: 60px;
      background: #F15BB5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 0 14px rgba(241,91,181,0.6));
      flex-shrink: 0;
    }

    /* ── Light-mode modal ── */
    .modal-sanctuary { background: #F9F9F9; color: #050505; }

    /* ── Radio / toggle — light mode ── */
    .opt-active-light {
      border-color: #FF6B35; color: #FF6B35;
      background: rgba(255,107,53,0.08);
      box-shadow: 0 0 16px rgba(255,107,53,0.25);
    }
    .opt-inactive-light { border-color: rgba(5,5,5,0.15); color: rgba(5,5,5,0.55); }
    .opt-inactive-light:hover {
      border-color: rgba(255,107,53,0.5); color: #FF6B35;
      background: rgba(255,107,53,0.06);
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #9B5DE5; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(155,93,229,0.4); border-radius: 10px; }

    /* ── Responsive font clamps ── */
    .hero-h1       { font-size: clamp(2.6rem, 11vw, 11rem); }
    .cat-h2        { font-size: clamp(2.2rem, 7.5vw, 7rem); }
    .section-h2    { font-size: clamp(1.8rem, 4.5vw, 3.8rem); }
    .card-title    { font-size: clamp(0.9rem, 3vw, 2rem); }
    .card-price    { font-size: clamp(1.2rem, 3.5vw, 2.8rem); }
    .modal-h2      { font-size: clamp(2rem, 5.5vw, 5rem); }
    .registry-value { font-size: clamp(3rem, 7.5vw, 6.5rem); }

    /* ── Nav dropdown ── */
    .nav-drop-panel { animation: dropIn 0.22s ease forwards; }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Premium nav tile hover ── */
    .nav-tile:hover {
      background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(155,93,229,0.1));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(155,93,229,0.18);
    }
    .nav-tile { transition: all 0.2s ease; border-radius: 12px; }

    /* ════════════════════════════════════════
       NEW: Fade-in / slide-in animations
    ════════════════════════════════════════ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .fade-in   { animation: fadeInUp 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    .fade-in-l { animation: fadeInLeft 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    .fade-in-r { animation: fadeInRight 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    .delay-100 { animation-delay: 0.10s; }
    .delay-200 { animation-delay: 0.20s; }
    .delay-300 { animation-delay: 0.30s; }
    .delay-400 { animation-delay: 0.40s; }
    .delay-500 { animation-delay: 0.50s; }
    .delay-600 { animation-delay: 0.60s; }
    .delay-700 { animation-delay: 0.70s; }

    /* ── Story section aura glows ── */
    .story-aura {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      animation: auraFloat 9s ease-in-out infinite alternate;
    }
    @keyframes auraFloat {
      0%   { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.14) translate(3%, 4%); }
    }

    /* ── Gallery filter active ── */
    .filter-active {
      background: linear-gradient(135deg, rgba(155,93,229,0.18), rgba(241,91,181,0.10));
      border-color: #9B5DE5 !important;
      color: #9B5DE5 !important;
      box-shadow: 0 0 22px rgba(155,93,229,0.30);
    }

    /* ── Hover glow on product cards ── */
    .product-card {
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    .product-card:hover {
      transform: translateY(-4px) scale(1.025);
      box-shadow: 0 0 0 2px rgba(155,93,229,0.35),
                  0 20px 50px rgba(155,93,229,0.18),
                  0 0 80px rgba(241,91,181,0.10);
    }

    /* ── Story section quote border pulse ── */
    @keyframes borderGlow {
      0%,100% { border-color: rgba(241,91,181,0.40); }
      50%     { border-color: rgba(241,91,181,0.85); }
    }
    .quote-border { animation: borderGlow 3s ease-in-out infinite; }
  </style>
</head>

        <h3 className="font-black text-lg md:text-2xl leading-snug">{question}</h3>
        <span className={`flex-shrink-0 mt-1 transition-transform duration-300 ${open ? 'rotate-45' : ''}`} style={{ color: '#FF6B35' }}>

  const calculatePrice = () => {
    if (!selectedItem) return 0;
    const configs = CUSTOMIZATIONS[selectedItem.id] || [];
    let total = selectedItem.p;
    configs.forEach(config => {
      const val = selectedOptions[config.key];
      if (config.type === 'toggle') {
        if (val === true) total += config.mod;
      } else {
        const opt = config.options && config.options.find(o => o.label === val);
        if (opt) total += opt.mod;

    return total;

            </div>
            <div className="grid md:grid-cols-2 gap-8 md:gap-12">
              <div className="glass p-6 md:p-10 space-y-5 fade-in-l delay-100">
                <h3 className="font-black text-xs uppercase tracking-[0.4em]" style={{ color:'#FF6B35' }}>Follow the Archive</h3>
                {[
                  { name:'TikTok',    handle:'@endgame.archive', color:'#F15BB5' },
                  { name:'Instagram', handle:'@endgame.archive', color:'#9B5DE5' },
                  { name:'Pinterest', handle:'endgame.archive',  color:'#00F5D4' },
                ].map(s => (
                  <a key={s.name} href="#"
                    className="flex items-center justify-between p-4 border-2 border-uv/20 rounded-2xl hover:border-uv transition-all group">
                    <span className="font-black text-sm uppercase tracking-widest" style={{ color:s.color }}>{s.name}</span>
                    <span className="flex items-center gap-1 font-bold text-sm opacity-50 group-hover:opacity-100 transition-opacity">
                      {s.handle} <IconArrow s={12} />
                    </span>
                  </a>
                ))}
              </div>
              <div className="glass p-6 md:p-10 space-y-4 fade-in-r delay-100">
                <h3 className="font-black text-xs uppercase tracking-[0.4em]" style={{ color:'#FF6B35' }}>Send a Message</h3>
                {['Your name', 'Your email'].map(ph => (
                  <input key={ph} type={ph.includes('email') ? 'email' : 'text'} placeholder={ph}
                    className={`w-full p-4 rounded-xl border-2 outline-none text-sm font-bold transition-all focus:border-uv font-sans ${isLight ? 'bg-black/5 border-black/10 text-abyss placeholder-abyss/30' : 'bg-white/5 border-white/10 text-white placeholder-white/30'}`} />
                ))}
                <textarea rows={4} placeholder="Your message..."
                  className={`w-full p-4 rounded-xl border-2 outline-none text-sm font-bold resize-none transition-all focus:border-uv font-sans ${isLight ? 'bg-black/5 border-black/10 text-abyss placeholder-abyss/30' : 'bg-white/5 border-white/10 text-white placeholder-white/30'}`} />
                <button className="btn-sunset w-full py-4 rounded-full font-black text-xs uppercase tracking-widest">
                  Send to Archive
                </button>
              </div>
            </div>
            <div className={`p-6 md:p-10 border-2 rounded-3xl text-center space-y-3 ${isLight ? 'border-uv/10' : 'border-uv/20'} fade-in delay-200`}>
              <div className="flex justify-center"><SunsetArchiveLogo size={52} placement="socials-card" /></div>
              <p className="font-black text-xs uppercase tracking-widest mt-4" style={{ color:'#FF6B35' }}>endgame.archive Studio</p>
              <p className="font-bold opacity-60">Huntsville, AL</p>
              <p className="font-black text-[10px] uppercase tracking-widest opacity-40">Elite Gaming Artifacts. Crafted in Huntsville, AL.</p>
            </div>
          </div>
        </div>
      )}

      {/* ════════════════════════════════════════════════════
          ALCHEMICAL STUDIO MODAL
      ════════════════════════════════════════════════════ */}
      {selectedItem && (
        <div className="fixed inset-0 z-[500] flex items-end md:items-center justify-center bg-abyss/95 backdrop-blur-3xl">
          <div className={`relative w-full md:max-w-6xl overflow-y-auto border-4 ${modalBorder} ${modalWrap} ${modalText} shadow-[0_0_80px_rgba(255,107,53,0.2)]`}
            style={{ maxHeight: '92vh', borderRadius: '32px 32px 0 0',
              padding: 'max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left))' }}>

            {/* Studio badge + close */}
            <div className="flex items-center justify-between mb-6 md:mb-8">
              <span className={`font-black text-[10px] uppercase tracking-[0.45em] px-4 py-2 rounded-full border ${isLight ? 'text-sunset border-sunset/30 bg-sunset/8' : 'text-uv border-uv/20 bg-uv/10'}`}>
                {studioLabel} — Aura Calibration
              </span>
              <button onClick={() => setSelectedItem(null)}
                className={`w-11 h-11 rounded-full border-2 flex items-center justify-center transition-all ${isLight ? 'border-abyss/20 hover:border-sunset text-abyss' : 'border-white/20 hover:border-uv text-white'}`}>
                <IconX s={14} />
              </button>
            </div>

            <div className="grid lg:grid-cols-2 gap-8 md:gap-20 items-start">
              {/* Left — product visual */}
              <div className={`aspect-square flex items-center justify-center relative overflow-hidden rounded-3xl border-4 ${isLight ? 'border-uv/20 bg-gradient-to-br from-pink/10 to-uv/10' : 'border-uv/40 animate-pulse-uv'}`}>
                {!isLight && <div className="absolute inset-0 bg-gradient-to-tr from-uv/50 to-cyan/40 animate-ooze opacity-60" />}
                <SunsetArchiveLogo size={isLight ? 140 : 160} placement="modal-visual" />
              </div>

              {/* Right — info + options + price */}
              <div className="space-y-7 md:space-y-9">
                <div>
                  <h2 className={`modal-h2 font-serif italic leading-[0.9] ${modalText}`}>{selectedItem.n}</h2>
                  <p className={`font-bold text-sm md:text-base mt-2 ${isLight ? 'text-abyss/55' : 'text-white/55'}`}>{selectedItem.t}</p>
                </div>

                {/* Dynamic Customization Panel */}
                <div className="space-y-6 max-h-[36vh] overflow-y-auto custom-scroll pr-2">
                  {(CUSTOMIZATIONS[selectedItem.id] || []).map(config => {
                    let modBadge = '';
                    if (config.type === 'toggle') {
                      modBadge = '+$' + config.mod;
                    } else {
                      const activeOpt = config.options && config.options.find(o => o.label === selectedOptions[config.key]);
                      if (activeOpt && activeOpt.mod > 0) modBadge = '+$' + activeOpt.mod;
                    }
                    return (
                      <div key={config.key} className="space-y-3">
                        <label className={`font-black text-[10px] uppercase tracking-widest flex items-center gap-3 ${labelOpacity}`}
                          style={{ color: isLight ? 'rgba(5,5,5,0.65)' : undefined }}>
                          {config.label}
                          {modBadge && (
                            <span className="font-black text-[10px] px-3 py-1 rounded-full border"
                              style={{ color: isLight ? '#FF6B35' : '#9B5DE5',
                                borderColor: isLight ? 'rgba(255,107,53,0.35)' : 'rgba(155,93,229,0.35)',
                                background: isLight ? 'rgba(255,107,53,0.08)' : 'rgba(155,93,229,0.08)' }}>
                              {modBadge}
                            </span>
                          )}
                        </label>

                        {/* RADIO */}
                        {config.type === 'radio' && (
                          <div className="flex flex-wrap gap-2 md:gap-3">
                            {config.options.map(opt => (
                              <button key={opt.label}
                                onClick={() => handleOptionChange(config.key, opt.label)}
                                className={`border-[3px] rounded-2xl py-3 px-4 font-black text-[10px] uppercase tracking-widest transition-all duration-300 ${radioActive(selectedOptions[config.key] === opt.label)}`}>
                                {opt.label}
                                {opt.mod > 0 && <span className="ml-1 opacity-50">+${opt.mod}</span>}
                              </button>
                            ))}
                          </div>
                        )}

                        {/* DROPDOWN */}
                        {config.type === 'dropdown' && (
                          <select
                            value={selectedOptions[config.key] || config.default}
                            onChange={e => handleOptionChange(config.key, e.target.value)}
                            className={`w-full border-[3px] rounded-2xl p-4 font-black text-xs uppercase tracking-wider outline-none cursor-pointer transition-all font-sans ${isLight ? 'border-abyss/15 text-abyss bg-white hover:border-sunset/50 focus:border-sunset' : 'border-white/10 text-white hover:border-uv/50 focus:border-uv'}`}
                            style={{ background: isLight ? '#ffffff' : 'rgba(5,5,5,0.88)', fontFamily:'Nunito, sans-serif' }}>
                            {config.options.map(opt => (
                              <option key={opt.label} value={opt.label}
                                style={{ background: isLight ? '#ffffff' : '#050505', color: isLight ? '#050505' : '#ffffff' }}>
                                {opt.label}{opt.mod > 0 ? ` (+$${opt.mod})` : ''}
                              </option>
                            ))}
                          </select>
                        )}

                        {/* TOGGLE */}
                        {config.type === 'toggle' && (
                          <button
                            onClick={() => handleOptionChange(config.key, !selectedOptions[config.key])}
                            className={`flex items-center gap-4 border-[3px] rounded-2xl py-4 px-6 font-black text-[10px] uppercase tracking-widest transition-all duration-300 ${toggleActive(selectedOptions[config.key])}`}>
                            <div className={`relative w-10 h-5 rounded-full border-2 border-current flex-shrink-0 transition-colors ${selectedOptions[config.key] ? (isLight ? 'bg-sunset/20' : 'bg-uv/30') : (isLight ? 'bg-abyss/8' : 'bg-white/10')}`}>
                              <div className={`absolute top-0.5 w-3.5 h-3.5 rounded-full bg-current transition-transform duration-300 ${selectedOptions[config.key] ? 'translate-x-[18px]' : 'translate-x-0.5'}`} />
                            </div>
                            {selectedOptions[config.key] ? 'Added — ' : 'Add — '}{config.label}
                          </button>
                        )}
                      </div>
                    );
                  })}
                  {(!CUSTOMIZATIONS[selectedItem.id] || CUSTOMIZATIONS[selectedItem.id].length === 0) && (
                    <p className={`font-bold text-xs uppercase tracking-widest ${isLight ? 'text-abyss/35' : 'text-white/35'}`}>
                      Standard configuration — no customizations available.
                    </p>
                  )}
                </div>

                {/* Live Registry Value */}
                <div className={`p-6 md:p-10 rounded-[32px] flex justify-between items-end border-4 ${isLight ? 'border-sunset/20 bg-sunset/5' : 'border-uv/40 bg-uv/5'}`}>
                  <div>
                    <span className={`font-serif italic text-xl md:text-3xl block ${isLight ? 'text-abyss/55' : 'opacity-60'}`}>Registry Value</span>
                    <span className={`font-black text-[10px] uppercase tracking-widest mt-1 block ${isLight ? 'text-sunset/60' : 'text-uv/60'}`}>
                      Base ${selectedItem.p} + options
                    </span>
                  </div>
                  <span className="registry-value font-serif italic leading-none" style={{ color: isLight ? '#FF6B35' : '#9B5DE5' }}>
                    ${calculatePrice()}
                  </span>
                </div>

                {/* CTA */}
                <div className="flex gap-4 md:gap-6">
                  <button
                    onClick={() => { setCartCount(c => c + 1); setSelectedItem(null); }}
                    className="btn-sunset flex-grow py-5 md:py-7 rounded-full font-black text-xs uppercase tracking-widest shadow-2xl flex items-center justify-center gap-2">
                    <IconCart s={14} /> Secure Item
                  </button>
                  <button onClick={() => setSelectedItem(null)}
                    className={`px-8 md:px-12 font-black text-xs uppercase tracking-widest transition-opacity ${isLight ? 'text-abyss opacity-35 hover:opacity-70' : 'opacity-40 hover:opacity-100'}`}>
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ════════════════ FOOTER ════════════════ */}
      <footer className={`py-20 md:py-40 border-t-8 transition-all ${isLight ? 'bg-pearl border-uv/10' : 'bg-abyss border-uv/30'}`}
        style={{ paddingLeft:'var(--sp-l)', paddingRight:'var(--sp-r)' }}>
        <div className="max-w-7xl mx-auto grid md:grid-cols-4 gap-12 md:gap-20">

          {/* Brand */}
          <div className="col-span-full md:col-span-2 space-y-8 md:space-y-10">
            {/* Logo — scroll to top on click */}
            <div className="flex items-center gap-4 cursor-pointer" onClick={() => goTo('home')}>
              <SunsetArchiveLogo size={56} placement="footer-seal" />
              <span className="font-black text-2xl md:text-4xl tracking-tighter">endgame.archive</span>
            </div>
            <p className="font-black text-xs md:text-sm uppercase tracking-[0.3em]" style={{ color:'#FF6B35' }}>
              Elite Gaming Artifacts. Crafted in Huntsville, AL.
            </p>
            <p className="font-serif italic text-xl md:text-3xl opacity-50 leading-snug">
              "For the Player 2 who became Player 1.<br />Setup reveals for the curated home."
            </p>
            <div className="space-y-3">
              <p className="font-black text-xs uppercase tracking-widest" style={{ color:'#FF6B35' }}>Huntsville, AL Studio — Node: Nominal</p>
              <div className="flex gap-6 opacity-60 font-black text-xs uppercase tracking-widest">
                <button onClick={() => goTo('socials')} className="hover:text-uv transition-colors">TikTok</button>
                <button onClick={() => goTo('socials')} className="hover:text-uv transition-colors">Instagram</button>
                <button onClick={() => goTo('socials')} className="hover:text-uv transition-colors">Pinterest</button>
              </div>
            </div>
          </div>

          {/* Directory */}
          <div className="space-y-8">
            <h5 className="font-black text-xs uppercase tracking-[0.5em]" style={{ color:'#FF6B35' }}>Directory</h5>
            <ul className="font-bold text-lg md:text-xl space-y-4 opacity-60">
              {[
                { label:'Home',             action: () => goTo('home') },
                { label:'Our Story',        action: () => goTo('about') },
                { label:'Premium Apparel',  action: () => navigateToCategory('Apparel') },
                { label:'Office Core',      action: () => navigateToCategory('Desktop') },
                { label:"Lily's Corner",    action: () => navigateToCategory('LilysCozyCorner') },
                { label:'Accessories',      action: () => navigateToCategory('KitchenArchive') },
                { label:'FAQ',              action: () => goTo('faq') },
                { label:'Socials & Contact',action: () => goTo('socials') },
              ].map(({ label, action }) => (
                <li key={label}>
                  <button onClick={action} className="flex items-center gap-2 hover:text-uv hover:translate-x-2 transition-all duration-200 text-left">
                    {label}
                  </button>
                </li>
              ))}
            </ul>
          </div>

          {/* Registry */}
          <div className="space-y-8">
            <div className="glass p-6 md:p-8 space-y-4">
              <p className="font-black text-xs uppercase tracking-widest" style={{ color:'#FF6B35' }}>Join the Registry</p>
              <input type="email" placeholder="your@email.com"
                className={`w-full p-4 rounded-xl border-2 text-sm font-bold outline-none focus:border-uv transition-all ${isLight ? 'bg-black/5 border-black/10 text-abyss placeholder-abyss/30' : 'bg-white/10 border-white/10 text-white placeholder-white/30'}`} />
              <button className="btn-sunset w-full py-4 rounded-full font-black text-xs uppercase tracking-widest">
                Register
              </button>
            </div>
            <span className="font-black text-[10px] tracking-widest uppercase opacity-20 block">
              © 2026 ARCHIVE STUDIO / HUNTSVILLE, AL NODE: NOMINAL
            </span>
          </div>

        </div>
      </footer>

    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
