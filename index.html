<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Icons ── */

const IconCoffee=({s=18})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1" stroke="#FF3399" strokeWidth="1.8"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" fill="rgba(255,51,153,0.12)" stroke="#FF3399" strokeWidth="1.8"/><line x1="6" y1="1" x2="6" y2="4" stroke="#C460EE" strokeWidth="1.8"/><line x1="10" y1="1" x2="10" y2="4" stroke="#C460EE" strokeWidth="1.8"/><line x1="14" y1="1" x2="14" y2="4" stroke="#C460EE" strokeWidth="1.8"/></svg>);

const IconMail=({s=18})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" fill="rgba(196,96,238,0.10)" stroke="#C460EE" strokeWidth="1.8"/><polyline points="22,6 12,13 2,6" stroke="#FF3399" strokeWidth="1.8"/></svg>);
const IconMenu=({s=20})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" strokeWidth="2"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" strokeWidth="2"/><line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" strokeWidth="2"/></svg>);
const IconX=({s=16})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" strokeWidth="2"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" strokeWidth="2"/></svg>);
const IconCart=({s=16,color="white"})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1" fill={color} stroke={color} strokeWidth="1"/><circle cx="20" cy="21" r="1" fill={color} stroke={color} strokeWidth="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" stroke={color} strokeWidth="1.8"/></svg>);
const IconChevron=({s=12,open=false})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round" style={{transform:open?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}><polyline points="6 9 12 15 18 9" stroke="currentColor" strokeWidth="2"/></svg>);

/* ── Logo ── */
const SunsetArchiveLogo=({size=42,placement='default'})=>{
  const gid=`vp-bg-${size}-${placement}`;const did=`vp-dot-${size}-${placement}`;const lid=`vp-lens-${size}-${placement}`;
  const dotPositions=[[26,26],[50,26],[74,26],[26,50],[50,50],[74,50],[26,74],[50,74],[74,74]];
  const r=size<=32?3.5:size<=52?4.8:7;
  return(<div style={{width:size,height:size,flexShrink:0,display:'inline-flex',alignItems:'center',justifyContent:'center'}}><svg viewBox="0 0 100 100" width={size} height={size} xmlns="http://www.w3.org/2000/svg" style={{overflow:'hidden',borderRadius:'50%'}}><defs><linearGradient id={gid} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#2A0A20"/><stop offset="45%" stopColor="#3D1060"/><stop offset="100%" stopColor="#1A0040"/></linearGradient><linearGradient id={did} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#FF3399"/><stop offset="50%" stopColor="#9B6FD4"/><stop offset="100%" stopColor="#00CDD4"/></linearGradient><radialGradient id={lid} cx="28%" cy="22%" r="68%"><stop offset="0%" stopColor="white" stopOpacity="0.72"/><stop offset="45%" stopColor="white" stopOpacity="0.18"/><stop offset="100%" stopColor="black" stopOpacity="0.10"/></radialGradient></defs><circle cx="50" cy="50" r="50" fill={`url(#${gid})`}/><circle cx="50" cy="50" r="47.5" fill="none" stroke="rgba(255,51,153,0.55)" strokeWidth="1.5"/>{dotPositions.map(([cx,cy],i)=>(<circle key={i} cx={cx} cy={cy} r={r} fill={`url(#${did})`} opacity={0.72+i*0.03}/>))}<circle cx="50" cy="50" r="50" fill={`url(#${lid})`}/></svg></div>);
};

/* ── FAQ Item ── */
const FAQItem=({question,answer,mode})=>{
  const[open,setOpen]=useState(false);
  const isLight=mode==='light';
  return(<div className={`border-b-2 pb-8 pt-2 transition-colors duration-300 ${isLight?'border-abyss/10':'border-uv/20'}`}><button className="w-full flex justify-between items-start gap-4 text-left" onClick={()=>setOpen(o=>!o)}><h3 className="font-black text-lg md:text-2xl leading-snug">{question}</h3><span className={`flex-shrink-0 mt-1 transition-transform duration-300 ${open?'rotate-45':''}`} style={{color:'#FF3399'}}><IconPlus s={22}/></span></button>{open&&(<p className="font-bold text-base md:text-xl opacity-70 mt-5 leading-relaxed">{answer}</p>)}</div>);
};
/* ── Vault Sidebar ── */
const VaultSidebar=({isOpen,onClose,mode,navigateToShop,goTo})=>{
  const isLight=mode==='light';
  const bg=isLight?'rgba(251,240,246,1.0)':'rgba(14,4,16,1.0)';
  const border=isLight?'rgba(255,51,153,0.18)':'rgba(196,96,238,0.40)';
  const SideBtn=({icon,children,onClick})=>(<button onClick={()=>{onClick();onClose();}} className={`w-full text-left px-4 py-3 flex items-center gap-3 font-black text-[11px] uppercase tracking-widest transition-all duration-200 rounded-xl mx-2 ${isLight?'hover:bg-black/5':'hover:bg-white/5'} opacity-75 hover:opacity-100`} style={{width:'calc(100% - 16px)'}}><span className="flex-shrink-0">{icon}</span>{children}</button>);
  const Divider=({label})=>(<div className="px-4 pt-5 pb-2 mt-1 border-t" style={{borderColor:border}}><span className="font-black text-[9px] uppercase tracking-[0.5em] text-uv opacity-55">{label}</span></div>);
  return(<>
    <div className="fixed inset-0 z-[390] transition-all duration-400" style={{background:'rgba(0,0,0,0.48)',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)',opacity:isOpen?1:0,pointerEvents:isOpen?'auto':'none'}} onClick={onClose}/>
    <div className={`vault-sidebar ${isOpen?'open':'closed'}`} style={{background:bg,borderRight:`1px solid ${border}`}}>
      <div className="flex items-center justify-between px-5 py-5 border-b" style={{borderColor:border}}>
        <div className="flex items-center gap-3 cursor-pointer" onClick={()=>{goTo('home');onClose();}}><span className="font-black text-sm tracking-tight uppercase">ENDGAME<span style={{color:'#FF3399'}}>.</span>ARCHIVE</span></div>
        <button onClick={onClose} aria-label="Close vault" className="w-8 h-8 flex items-center justify-center opacity-45 hover:opacity-100 transition-opacity"><IconX s={16}/></button>
      </div>
      <nav className="flex-1 overflow-y-auto py-3">
        <Divider label="Navigate"/>
        <SideBtn icon={<IconHome s={16}/>} onClick={()=>goTo('home')}>Home</SideBtn>

/* ── Main App ── */
const App=()=>{
  const[view,setView]=useState('home');
  const[activeCategory,setActiveCategory]=useState('All');
  const[activeGame,setActiveGame]=useState('All');
  const[selectedItem,setSelectedItem]=useState(null);
  const[mode,setMode]=useState('light');
  const[cartCount,setCartCount]=useState(0);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[selectedOptions,setSelectedOptions]=useState({});
  const[openDropdown,setOpenDropdown]=useState(null);
  const[galleryOpen,setGalleryOpen]=useState(false);
  const[galleryFilter,setGalleryFilter]=useState('All');
  const[filtersOpen,setFiltersOpen]=useState(false);
  const galleryRef=useRef(null);

  /* body class */
  useEffect(()=>{
    document.body.className=mode==='light'
      ?'bg-pearl text-abyss font-sans selection:bg-uv selection:text-white overflow-x-hidden transition-colors duration-500'
      :'bg-abyss text-pearl font-sans selection:bg-uv selection:text-white overflow-x-hidden transition-colors duration-500';
  },[mode]);

  /* scroll to top on every view change */
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[view]);

  /* defaults when item selected */
  useEffect(()=>{
    if(selectedItem){
      const configs=CUSTOMIZATIONS[selectedItem.id]||[];
      const defaults={};
      configs.forEach(c=>{defaults[c.key]=c.default;});
      setSelectedOptions(defaults);
    }
  },[selectedItem]);

  /* ── Browser History API ── */
  useEffect(()=>{
    history.replaceState({view:'home',category:'All',game:'All'},'');
    const handlePop=(e)=>{
      if(e.state){
        setView(e.state.view||'home');
        setActiveCategory(e.state.category||'All');
        setActiveGame(e.state.game||'All');
        setSelectedItem(null);
        setOpenDropdown(null);
      }
    };
    window.addEventListener('popstate',handlePop);
    return()=>window.removeEventListener('popstate',handlePop);
  },[]);

  /* Navigation helpers */
  const navigateToShop=(category='All',game='All')=>{
    history.pushState({view:'shop',category,game},'','#shop');
    setActiveCategory(category);
    setActiveGame(game);
    setView('shop');
    setOpenDropdown(null);
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const goTo=(viewName)=>{
    history.pushState({view:viewName,category:'All',game:'All'},'','#'+viewName);
    setView(viewName);
    setOpenDropdown(null);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const handleOptionChange=(key,value)=>setSelectedOptions(prev=>({...prev,[key]:value}));

  const calculatePrice=()=>{

                {q:"What is the Alchemical Studio?",a:"The Alchemical Studio is our in-modal customization engine. Click any product to unlock finish tiers, size configurations, embroidery, material grades, and more; with a live Registry Value that updates in real time. In Day Mode it operates as The Laboratory; in Night Mode it becomes The Abyssal Vault."},
                {q:"What premium finishes are available?",a:"We offer Iridescent, UV-Reactive, Void Matte, and Liquid Chrome finishes across applicable products, plus UV Edge Stitching on mats and custom engraving on select pieces. Each finish is applied by hand in our Huntsville, AL studio."},
                {q:"How do the game and category filters work?",a:"The shop features two independent filter dimensions: Category (Apparel, Sanctuary, Home, Lily's Corner, Pets) and Game (Hades 2, Street Fighter 6, Stardew Valley, Tetris). Use them independently or together to zero in on exactly the artifacts you want."},
                {q:"What does 'IYKYK' mean for these products?",a:"Every product in the Genesis Archive is tied to an insider mechanic, secret, or community meme from the game it represents. The lore detail on each card references the specific in-game moment. If you know, you know."},
                {q:"How long does production take?",a:"Custom artifacts with premium finishes or engraving typically take 7-14 business days. Standard configurations ship within 3-5 business days from Huntsville, AL."},
                {q:"What is your return policy?",a:"All custom, personalized, or made-to-order items are final sale. Standard items may be returned within 14 days of delivery in original, unused condition."},
              ].map((item,i)=>(<FAQItem key={i} question={item.q} answer={item.a} mode={mode}/>))}
            </div>
          </div>
        </div>
      )}

      {/* ══ SOCIALS ══ */}
      {view==='socials'&&(
        <div className="pt-28 md:pt-40 pb-32 md:pb-48 page-px">
          <div className="max-w-4xl mx-auto space-y-12 md:space-y-20">
            <div className="space-y-4 fade-in">
              <p className="font-black text-[10px] uppercase tracking-[0.48em]" style={{color:'#FF3399'}}>Connect</p>
              <h1 className="font-serif italic leading-tight" style={{fontSize:'clamp(2.2rem,8vw,6rem)'}}>Socials &amp;<br/>Contact.</h1>
              <p className={`font-bold text-base md:text-xl max-w-md ${isLight?'opacity-58':'opacity-48'}`}>Follow the archive. Slide into the vault.</p>
            </div>
            <div className="grid md:grid-cols-2 gap-8 md:gap-12">
              <div className="glass p-6 md:p-10 space-y-5 fade-in-l delay-100">
                <h3 className="font-black text-xs uppercase tracking-[0.4em]" style={{color:'#FF3399'}}>Follow the Archive</h3>
                {[{name:'TikTok',handle:'@endgame.archive',color:'#7B2FFF',href:'#'},{name:'Instagram',handle:'@endgame.archive',color:'#FF3399',href:'https://www.instagram.com/endgame.archive/'},{name:'Pinterest',handle:'endgame.archive',color:'#00CDD4',href:'#'}].map(s=>(
                  <a key={s.name} href={s.href} target={s.href!=='#'?'_blank':undefined} rel="noopener noreferrer" className="flex items-center justify-between p-4 border-2 border-hotpink/18 rounded-2xl hover:border-hotpink transition-all group">
                    <span className="font-black text-sm uppercase tracking-widest" style={{color:s.color}}>{s.name}</span>
                    <span className="flex items-center gap-1 font-bold text-sm opacity-48 group-hover:opacity-100 transition-opacity">{s.handle} <IconArrow s={12}/></span>
                  </a>
                ))}
              </div>
              <div className="glass p-6 md:p-10 space-y-4 fade-in-r delay-100">
                <h3 className="font-black text-xs uppercase tracking-[0.4em]" style={{color:'#FF3399'}}>Send a Message</h3>
                {['Your name','Your email'].map(ph=>(<input key={ph} type={ph.includes('email')?'email':'text'} placeholder={ph} className={`w-full p-4 rounded-xl border-2 outline-none text-sm font-bold transition-all focus:border-hotpink font-sans ${isLight?'bg-pearl/40 border-hotpink/12 text-abyss placeholder-abyss/28':'bg-white/5 border-white/10 text-white placeholder-white/28'}`}/>))}
                <textarea rows={4} placeholder="Your message..." className={`w-full p-4 rounded-xl border-2 outline-none text-sm font-bold resize-none transition-all focus:border-hotpink font-sans ${isLight?'bg-pearl/40 border-hotpink/12 text-abyss placeholder-abyss/28':'bg-white/5 border-white/10 text-white placeholder-white/28'}`}/>
                <button className="btn-sunset w-full py-4 rounded-full font-black text-xs uppercase tracking-widest">Send to Archive</button>
              </div>
            </div>
            <div className={`p-6 md:p-10 border-2 rounded-3xl text-center space-y-3 ${isLight?'border-uv/10':'border-uv/18'} fade-in delay-200`}>
              <div className="flex justify-center"><span className="font-black text-2xl tracking-tight uppercase">ENDGAME<span style={{color:'#FF3399'}}>.</span>ARCHIVE</span></div>
              <p className="font-black text-xs uppercase tracking-widest mt-4" style={{color:'#FF3399'}}>endgame.archive Studio</p>
              <p className="font-bold opacity-55">Huntsville, AL</p>
              <p className="font-black text-[10px] uppercase tracking-widest opacity-38">Elite Gaming Artifacts. Crafted in Huntsville, AL.</p>
            </div>
          </div>
        </div>
      )}

      {/* ══ PRODUCT MODAL ══ */}
      {selectedItem&&(
        <div className="fixed inset-0 z-[500] flex items-end md:items-center justify-center bg-abyss/92 backdrop-blur-3xl">
          <div className={`relative w-full md:max-w-6xl overflow-y-auto border-4 ${modalBorder} ${modalWrap} ${modalText} shadow-[0_0_70px_rgba(255,31,156,0.18)]`}
            style={{maxHeight:'92vh',borderRadius:'28px 28px 0 0',padding:'max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left))'}}>
            {/* Modal header */}
            <div className="flex items-center justify-between mb-6 md:mb-8">
              <div className="flex items-center gap-3 flex-wrap">
                <span className={`font-black text-[10px] uppercase tracking-[0.42em] px-4 py-2 rounded-full border ${isLight?'text-hotpink border-hotpink/28 bg-hotpink/6':'text-uv border-uv/18 bg-uv/10'}`}>{studioLabel} - Aura Calibration</span>
                <span className="px-3 py-1.5 rounded-full font-black text-[9px] uppercase tracking-wider" style={{background:`${GAME_COLORS[selectedItem.game]}18`,border:`1px solid ${GAME_COLORS[selectedItem.game]}38`,color:GAME_COLORS[selectedItem.game]}}>{selectedItem.game}</span>
              </div>
              <button onClick={()=>setSelectedItem(null)} className={`w-11 h-11 rounded-full border-2 flex items-center justify-center transition-all ${isLight?'border-abyss/18 hover:border-hotpink text-abyss':'border-white/18 hover:border-uv text-white'}`}><IconX s={14}/></button>
            </div>

            <div className="grid lg:grid-cols-2 gap-8 md:gap-20 items-start">
              {/* Visual */}
              <div className={`aspect-square flex items-center justify-center relative overflow-hidden rounded-3xl border-4 ${isLight?'border-hotpink/18 bg-gradient-to-br from-pearl-mid to-sanctuary':'border-uv/38 animate-pulse-uv'}`} style={isLight?{background:'linear-gradient(135deg,#F3E2EE,#EBD2E6)'}:{}}>
                {isLight&&<div className="absolute inset-0" style={{background:'radial-gradient(ellipse 70% 55% at 28% 22%,rgba(255,255,255,0.72) 0%,rgba(255,230,245,0.40) 40%,transparent 100%)'}}/>}
                {!isLight&&<div className="absolute inset-0 bg-gradient-to-tr from-uv/45 to-cyan/35 animate-ooze opacity-55"/>}
                <SunsetArchiveLogo size={isLight?130:150} placement="modal-visual"/>
              </div>

              {/* Config panel */}
              <div className="space-y-6 md:space-y-7">
                <div>
                  <h2 className={`modal-h2 font-serif italic leading-[0.9] ${modalText}`}>{selectedItem.name}</h2>
                  <p className={`font-bold text-sm md:text-base mt-2 ${isLight?'text-abyss/52':'text-white/52'}`}>{selectedItem.tagline}</p>
                </div>
                {/* Lore */}
                <div className={`p-4 md:p-5 rounded-2xl border-2 ${isLight?'border-hotpink/12 bg-hotpink/3':'border-uv/13 bg-uv/7'}`}>
                  <p className="font-black text-[9px] uppercase tracking-[0.38em] mb-2" style={{color:GAME_COLORS[selectedItem.game]}}>Lore - {selectedItem.loreDetail}</p>
                  <p className="font-serif italic text-sm md:text-base leading-relaxed opacity-78">{selectedItem.lore}</p>
                </div>
                {/* Customization options */}
                <div className="space-y-6 max-h-[32vh] overflow-y-auto custom-scroll pr-2">
                  {(CUSTOMIZATIONS[selectedItem.id]||[]).map(config=>{
                    let modBadge='';
                    if(config.type==='toggle'){modBadge='+$'+config.mod;}
                    else{const activeOpt=config.options&&config.options.find(o=>o.label===selectedOptions[config.key]);if(activeOpt&&activeOpt.mod>0)modBadge='+$'+activeOpt.mod;}
                    return(
                      <div key={config.key} className="space-y-3">
                        <label className={`font-black text-[10px] uppercase tracking-widest flex items-center gap-3 ${labelOpacity}`}>
                          {config.label}
                          {modBadge&&(<span className="font-black text-[10px] px-3 py-1 rounded-full border" style={{color:isLight?'#FF3399':'#C460EE',borderColor:isLight?'rgba(255,51,153,0.32)':'rgba(196,96,238,0.32)',background:isLight?'rgba(255,51,153,0.07)':'rgba(196,96,238,0.07)'}}>{modBadge}</span>)}
                        </label>
                        {config.type==='radio'&&(
                          <div className="flex flex-wrap gap-2 md:gap-3">
                            {config.options.map(opt=>(<button key={opt.label} onClick={()=>handleOptionChange(config.key,opt.label)} className={`border-[3px] rounded-2xl py-3 px-4 font-black text-[10px] uppercase tracking-widest transition-all duration-300 ${radioActive(selectedOptions[config.key]===opt.label)}`}>{opt.label}{opt.mod>0&&<span className="ml-1 opacity-48">+${opt.mod}</span>}</button>))}
                          </div>
                        )}
                        {config.type==='dropdown'&&(
                          <select value={selectedOptions[config.key]||config.default} onChange={e=>handleOptionChange(config.key,e.target.value)} className={`w-full border-[3px] rounded-2xl p-4 font-black text-xs uppercase tracking-wider outline-none cursor-pointer transition-all font-sans ${isLight?'border-abyss/14 text-abyss bg-white hover:border-hotpink/48 focus:border-hotpink':'border-white/10 text-white hover:border-uv/48 focus:border-uv'}`} style={{background:isLight?'#FBF0F6':'rgba(30,10,24,0.92)',fontFamily:'Outfit,Space Grotesk,sans-serif'}}>
                            {config.options.map(opt=>(<option key={opt.label} value={opt.label} style={{background:isLight?'#FBF0F6':'#1E0A18',color:isLight?'#1E0A18':'#FBF0F6'}}>{opt.label}{opt.mod>0?` (+$${opt.mod})`:''}</option>))}
                          </select>
                        )}
                        {config.type==='toggle'&&(
                          <button onClick={()=>handleOptionChange(config.key,!selectedOptions[config.key])} className={`flex items-center gap-4 border-[3px] rounded-2xl py-4 px-6 font-black text-[10px] uppercase tracking-widest transition-all duration-300 ${toggleActive(selectedOptions[config.key])}`}>
                            <div className={`relative w-10 h-5 rounded-full border-2 border-current flex-shrink-0 transition-colors ${selectedOptions[config.key]?(isLight?'bg-sunset/18':'bg-uv/28'):(isLight?'bg-abyss/6':'bg-white/8')}`}>
                              <div className={`absolute top-0.5 w-3.5 h-3.5 rounded-full bg-current transition-transform duration-300 ${selectedOptions[config.key]?'translate-x-[18px]':'translate-x-0.5'}`}/>
                            </div>
                            {selectedOptions[config.key]?'Added - ':'Add - '}{config.label}
                          </button>
                        )}
                      </div>
                    );
                  })}
                  {(!CUSTOMIZATIONS[selectedItem.id]||CUSTOMIZATIONS[selectedItem.id].length===0)&&(<p className={`font-bold text-xs uppercase tracking-widest ${isLight?'text-abyss/32':'text-white/32'}`}>Standard configuration; no customizations available.</p>)}
                </div>
                {/* Registry Value */}
                <div className={`p-6 md:p-10 rounded-[28px] flex justify-between items-end border-4 ${isLight?'border-hotpink/18 bg-hotpink/4':'border-uv/38 bg-uv/5'}`}>
                  <div>
                    <span className={`font-serif italic text-xl md:text-3xl block ${isLight?'text-abyss/52':'opacity-58'}`}>Registry Value</span>
                    <span className={`font-black text-[10px] uppercase tracking-widest mt-1 block ${isLight?'text-hotpink/55':'text-uv/55'}`}>Base ${selectedItem.price} + options</span>
                  </div>
                  <span className="registry-value font-serif italic leading-none" style={{color:isLight?'#FF3399':'#C460EE'}}>${calculatePrice()}</span>
                </div>
                {/* CTA */}
                <div className="flex gap-4 md:gap-6">
                  <button onClick={()=>{setCartCount(c=>c+1);setSelectedItem(null);}} className="btn-sunset flex-grow py-5 md:py-7 rounded-full font-black text-xs uppercase tracking-widest shadow-2xl flex items-center justify-center gap-2"><IconCart s={14}/>Secure Item</button>
                  <button onClick={()=>setSelectedItem(null)} className={`px-8 md:px-12 font-black text-xs uppercase tracking-widest transition-opacity ${isLight?'text-abyss opacity-32 hover:opacity-65':'opacity-38 hover:opacity-100'}`}>Cancel</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══ FOOTER ══ */}
      <footer className={`pt-0 pb-20 md:pb-40 transition-all ${isLight?'':'bg-abyss'}`} style={{background:isLight?'#1E0A18':'#1E0A18',color:'rgba(255,255,255,0.6)',paddingLeft:'var(--sp-l)',paddingRight:'var(--sp-r)'}}>
        {/* Iridescent rule */}
        <div style={{height:'2px',background:'linear-gradient(135deg,#FF3399 0%,#C460EE 18%,#7B2FFF 32%,#00CDD4 50%,#A8E8B0 68%,#FFE866 82%,#FF3399 100%)',backgroundSize:'200% 200%',animation:'iri-shift 8s ease-in-out infinite alternate',marginBottom:'clamp(40px,5vw,64px)',opacity:0.7}}/>
        <div className="max-w-7xl mx-auto grid md:grid-cols-4 gap-12 md:gap-20">
          {/* Brand col */}
          <div className="col-span-full md:col-span-2 space-y-6">
            <div className="cursor-pointer" onClick={()=>goTo('home')}>
              <span style={{fontFamily:'Outfit,sans-serif',fontWeight:900,fontSize:'28px',letterSpacing:'-0.01em',color:'white'}}>ENDGAME<span style={{color:'#FF3399'}}>.</span>ARCHIVE</span>
            </div>
            <p style={{fontFamily:'Cormorant Garamond,Georgia,serif',fontStyle:'italic',fontSize:'15px',fontWeight:300,color:'rgba(255,255,255,0.38)',lineHeight:1.8,maxWidth:'260px'}}>
              The elite aura your setup deserves.<br/>
              Manifesting the next era of high-def artifacts.<br/>
              Crafted in Huntsville, AL.
            </p>
            <div style={{display:'flex',gap:'24px',marginTop:'8px'}}>
              {['TikTok','Instagram','Pinterest'].map(s=>(
                <button key={s} onClick={()=>goTo('socials')} style={{fontFamily:'Space Mono,monospace',fontSize:'9px',letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.28)',background:'none',border:'none',cursor:'pointer',transition:'color 0.2s'}}
                  onMouseOver={function(e){e.currentTarget.style.color='#FF3399'}} onMouseOut={function(e){e.currentTarget.style.color='rgba(255,255,255,0.28)'}}>{s}</button>
              ))}
            </div>
          </div>
          {/* Archive col */}
          <div className="space-y-5">
            <p style={{fontFamily:'Space Mono,monospace',fontSize:'9px',letterSpacing:'0.22em',textTransform:'uppercase',color:'rgba(255,255,255,0.22)',marginBottom:'6px'}}>Archive</p>
            <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:'12px'}}>
              {[
                {label:'All Artifacts',action:()=>navigateToShop('All')},
                {label:'Apparel',action:()=>navigateToShop('Apparel')},
                {label:'Sanctuary',action:()=>navigateToShop('Sanctuary')},
                {label:"Lily's Corner",action:()=>navigateToShop("Lily's Corner")},
                {label:'Pets',action:()=>navigateToShop('Pets')},
              ].map(({label,action})=>(
                <li key={label}><button onClick={action} style={{fontFamily:'Outfit,sans-serif',fontWeight:600,fontSize:'14px',color:'rgba(255,255,255,0.50)',background:'none',border:'none',cursor:'pointer',transition:'color 0.2s'}}
                  onMouseOver={function(e){e.currentTarget.style.color='white'}} onMouseOut={function(e){e.currentTarget.style.color='rgba(255,255,255,0.50)'}}>{label}</button></li>
              ))}
            </ul>
          </div>
          {/* Studio col */}
          <div className="space-y-5">
            <p style={{fontFamily:'Space Mono,monospace',fontSize:'9px',letterSpacing:'0.22em',textTransform:'uppercase',color:'rgba(255,255,255,0.22)',marginBottom:'6px'}}>Studio</p>
            <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:'12px'}}>
              {[
                {label:'Manifesto',action:()=>goTo('about')},
                {label:'FAQ / Registry',action:()=>goTo('faq')},
                {label:'Socials',action:()=>goTo('socials')},
                {label:'Huntsville Studio',action:()=>goTo('about')},
              ].map(({label,action})=>(
                <li key={label}><button onClick={action} style={{fontFamily:'Outfit,sans-serif',fontWeight:600,fontSize:'14px',color:'rgba(255,255,255,0.50)',background:'none',border:'none',cursor:'pointer',transition:'color 0.2s'}}
                  onMouseOver={function(e){e.currentTarget.style.color='white'}} onMouseOut={function(e){e.currentTarget.style.color='rgba(255,255,255,0.50)'}}>{label}</button></li>
              ))}
            </ul>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'16px'}}>
              {Object.entries(GAME_COLORS).map(([game,color])=>(<button key={game} onClick={()=>navigateToShop('All',game)} style={{padding:'5px 10px',borderRadius:'2px',fontFamily:'Space Mono,monospace',fontSize:'8px',letterSpacing:'0.12em',textTransform:'uppercase',border:`1px solid ${color}44`,color,background:`${color}10`,cursor:'pointer'}}>{game}</button>))}
            </div>
          </div>
        </div>
        {/* Footer bottom bar */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:'36px',marginTop:'64px',borderTop:'1px solid rgba(255,255,255,0.06)',flexWrap:'wrap',gap:'16px'}}>
          <p style={{fontFamily:'Space Mono,monospace',fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(255,255,255,0.18)'}}>© 2026 endgame.archive · All rights reserved · Huntsville, AL</p>
          <div style={{display:'flex',gap:'24px'}}>
            {['Instagram','TikTok','Privacy'].map(s=>(
              <button key={s} onClick={()=>goTo('socials')} style={{fontFamily:'Space Mono,monospace',fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(255,255,255,0.25)',background:'none',border:'none',cursor:'pointer',transition:'color 0.2s'}}
                onMouseOver={function(e){e.currentTarget.style.color='#FF3399'}} onMouseOut={function(e){e.currentTarget.style.color='rgba(255,255,255,0.25)'}}>{s}</button>
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
