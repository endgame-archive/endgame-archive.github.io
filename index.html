  const[activeGame,setActiveGame]=useState('All');
  const[selectedItem,setSelectedItem]=useState(null);
  const[mode,setMode]=useState('light');
  const[cartCount,setCartCount]=useState(0);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[selectedOptions,setSelectedOptions]=useState({});
  const[openDropdown,setOpenDropdown]=useState(null);
  const[galleryOpen,setGalleryOpen]=useState(false);
  const[galleryFilter,setGalleryFilter]=useState('All');
  const[filtersOpen,setFiltersOpen]=useState(false);
  const galleryRef=useRef(null);

  /* body class */
  useEffect(()=>{
    document.body.className=mode==='light'

                      const isActiveGame=activeGame===game;
                      const gc=GAME_COLORS[game];
                      return(<button key={game} onClick={()=>setActiveGame(game)} className={`px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-widest border-2 transition-all duration-300 ${!isActiveGame?(isLight?'border-abyss/14 text-abyss/48 hover:border-uv/48 hover:text-uv hover:bg-uv/5':'border-white/14 text-white/48 hover:border-uv/48 hover:text-uv hover:bg-uv/10'):(game==='All'?'filter-active':'')}`} style={isActiveGame&&game!=='All'?{borderColor:gc,color:gc,background:`${gc}12`,boxShadow:`0 0 18px ${gc}22`}:{}}>{game}</button>);
                    })}
                  </div>
                </div>
              )}
            </div>

            {/* Grid */}
            <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-5">
              {filteredProducts.length===0?(

                  <button onClick={()=>{setActiveGame('All');setActiveCategory('All');}} className="btn-sunset px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-lg">Clear Filters</button>

      {/* ══ ABOUT ══ */}
      {view==='about'&&(
        <div className="pt-28 md:pt-40 pb-32 md:pb-48 page-px">
          <div className="max-w-4xl mx-auto space-y-10 md:space-y-16">
            <div className="space-y-4 fade-in">
              <span className="font-black text-[10px] uppercase tracking-[0.58em]" style={{color:'#FF3366'}}>The Studio - Est. 2022 - Huntsville, AL</span>
              <h1 className="cat-h2 font-serif italic">Our Story.</h1>
              <p className={`font-bold text-xl md:text-2xl leading-relaxed max-w-2xl ${isLight?'opacity-68':'opacity-58'}`}>From Player 2 to Curator. A love story, a setup obsession, and the luxury gaming brand nobody was making.</p>
            </div>
            <div className={`border-l-4 pl-8 py-2 quote-border ${isLight?'border-pink/45':'border-pink/38'}`}>
              <p className="font-serif italic leading-tight" style={{fontSize:'clamp(1.5rem,3.5vw,2.6rem)'}}>"For the Player 2 who became Player 1."</p>
            </div>
            <div className={`space-y-8 font-bold text-lg md:text-xl leading-relaxed fade-in delay-200 ${isLight?'opacity-78':'opacity-72'}`}>
              <p>I didn't grow up with a controller. Until 2022, gaming was someone else's world; a language I admired from the outside but never spoke. What changed everything wasn't a console drop or a viral moment. It was <span className="font-black" style={{color:'#FF3366'}}>love</span>, and a four-year long-distance relationship that brought me to <span style={{color:'#FF3366'}} className="font-black">Huntsville, AL</span>.</p>
              <p>Bryan didn't just invite me to play; he patiently built a bridge into his world. Our first co-op session was <span className="font-black" style={{color:'#7B4FF0'}}>It Takes Two</span>; a beautiful disaster. <span className="font-black" style={{color:'#7B4FF0'}}>Overcooked 2</span> really tested our relationship. But that messy, chaotic learning curve sparked something I didn't expect: obsession.</p>
              <p>From the depths of <span style={{color:'#A139C2'}} className="font-black">Hades I &amp; II</span> to the arenas of <span style={{color:'#A139C2'}} className="font-black">Street Fighter 6</span>, the farms of <span style={{color:'#FF3366'}} className="font-black">Stardew Valley</span>, and the impossible stacks of <span style={{color:'#7B4FF0'}} className="font-black">Tetris TGM</span>; my player leveled up completely. But the void never changed.</p>
              <p>Where was the aesthetic for someone like me? Minimal. Girly. Cozy-luxe. European chic meets elite gamer. <span style={{color:'#00FFC8'}} className="font-black">Not another piece of plastic.</span></p>
            </div>
            <div className={`p-8 md:p-12 border-4 border-uv/18 bg-uv/4 rounded-[28px] space-y-4 fade-in delay-300`}>
              <h4 className="font-black text-xs uppercase tracking-widest text-uv">The Mission</h4>
              <p className="font-serif italic leading-tight" style={{fontSize:'clamp(1.4rem,3.5vw,2.4rem)'}}>"Your setup is a sanctuary. If we escape into elite worlds, our physical space should match that energy."</p>
            </div>
            <div className={`p-6 md:p-10 border-2 rounded-[22px] space-y-4 ${isLight?'border-uv/10':'border-uv/18'}`}>
              <p className="font-black text-xs uppercase tracking-[0.48em]" style={{color:'#FF3366'}}>Our Home</p>
              <p className={`font-bold text-lg md:text-xl leading-relaxed ${isLight?'opacity-78':'opacity-68'}`}>Drawn by love, stayed for the soul. Proud to be rooted in <strong style={{color:'#FF3366'}}>Huntsville, Alabama</strong>; Rocket City. Every artifact is conceptualized, curated, and quality-checked in our Huntsville, AL workshop before it ships to you.</p>
            </div>
            <button onClick={()=>navigateToShop('All')} className="flex items-center gap-2 font-black text-xs uppercase tracking-widest hover:opacity-65 transition-opacity" style={{borderBottom:'3px solid #FF3366',color:'#FF3366',paddingBottom:'6px'}}>Browse the Genesis Archive <IconArrow s={12}/></button>
          </div>
        </div>
      )}

            <div className="mb-12 md:mb-20 space-y-4 fade-in">
              <p className="font-black text-[10px] uppercase tracking-[0.48em]" style={{color:'#FF3366'}}>Archive FAQ</p>
              <h1 className="cat-h2 font-serif italic">Questions?<br/>We got you.</h1>
              <p className={`font-bold text-base md:text-xl max-w-xl ${isLight?'opacity-58':'opacity-48'}`}>Everything you need to know about endgame.archive and the Genesis Archive catalog.</p>
            </div>
            <div className="space-y-2">
              {[
                {q:"Where is endgame.archive based?",a:"endgame.archive is a boutique studio rooted in Huntsville, AL; Rocket City. Every artifact is conceptualized, curated, and quality-checked in our Huntsville, AL workshop before it ships to you."},
                {q:"What is the Genesis Archive catalog?",a:"The Genesis Archive is our full product catalog: 23 IYKYK artifacts across 5 categories (Apparel, Sanctuary, Home, Lily's Corner, and Pets) and 4 game universes (Hades 2, Street Fighter 6, Stardew Valley, Tetris). Every product is connected to a specific in-game mechanic, lore secret, or community moment."},

                {q:"What premium finishes are available?",a:"We offer Iridescent, UV-Reactive, Void Matte, and Liquid Chrome finishes across applicable products, plus UV Edge Stitching on mats and custom engraving on select pieces. Each finish is applied by hand in our Huntsville, AL studio."},
                {q:"How do the game and category filters work?",a:"The shop features two independent filter dimensions: Category (Apparel, Sanctuary, Home, Lily's Corner, Pets) and Game (Hades 2, Street Fighter 6, Stardew Valley, Tetris). Use them independently or together to zero in on exactly the artifacts you want."},
                {q:"What does 'IYKYK' mean for these products?",a:"Every product in the Genesis Archive is tied to an insider mechanic, secret, or community meme from the game it represents. The lore detail on each card references the specific in-game moment. If you know, you know."},
                {q:"How long does production take?",a:"Custom artifacts with premium finishes or engraving typically take 7-14 business days. Standard configurations ship within 3-5 business days from Huntsville, AL."},
                {q:"What is your return policy?",a:"All custom, personalized, or made-to-order items are final sale. Standard items may be returned within 14 days of delivery in original, unused condition."},

                <button className="btn-sunset w-full py-4 rounded-full font-black text-xs uppercase tracking-widest">Send to Archive</button>
              </div>
            </div>
            <div className={`p-6 md:p-10 border-2 rounded-3xl text-center space-y-3 ${isLight?'border-uv/10':'border-uv/18'} fade-in delay-200`}>
              <div className="flex justify-center"><SunsetArchiveLogo size={52} placement="socials-card"/></div>
              <p className="font-black text-xs uppercase tracking-widest mt-4" style={{color:'#FF3366'}}>endgame.archive Studio</p>
              <p className="font-bold opacity-55">Huntsville, AL</p>
              <p className="font-black text-[10px] uppercase tracking-widest opacity-38">Elite Gaming Artifacts. Crafted in Huntsville, AL.</p>
            </div>
          </div>
        </div>
      )}

      {/* ══ PRODUCT MODAL ══ */}
      {selectedItem&&(
        <div className="fixed inset-0 z-[500] flex items-end md:items-center justify-center bg-abyss/92 backdrop-blur-3xl">
          <div className={`relative w-full md:max-w-6xl overflow-y-auto border-4 ${modalBorder} ${modalWrap} ${modalText} shadow-[0_0_70px_rgba(161,57,194,0.24)]`}
            style={{maxHeight:'92vh',borderRadius:'28px 28px 0 0',padding:'max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left))'}}>
            {/* Modal header */}
            <div className="flex items-center justify-between mb-6 md:mb-8">
              <div className="flex items-center gap-3 flex-wrap">
                <span className={`font-black text-[10px] uppercase tracking-[0.42em] px-4 py-2 rounded-full border ${isLight?'text-sunset border-sunset/28 bg-sunset/6':'text-uv border-uv/18 bg-uv/10'}`}>{studioLabel} - Aura Calibration</span>
                <span className="px-3 py-1.5 rounded-full font-black text-[9px] uppercase tracking-wider" style={{background:`${GAME_COLORS[selectedItem.game]}18`,border:`1px solid ${GAME_COLORS[selectedItem.game]}38`,color:GAME_COLORS[selectedItem.game]}}>{selectedItem.game}</span>
              </div>
              <button onClick={()=>setSelectedItem(null)} className={`w-11 h-11 rounded-full border-2 flex items-center justify-center transition-all ${isLight?'border-abyss/18 hover:border-sunset text-abyss':'border-white/18 hover:border-uv text-white'}`}><IconX s={14}/></button>
            </div>

            <div className="grid lg:grid-cols-2 gap-8 md:gap-20 items-start">
              {/* Visual */}
              <div className={`aspect-square flex items-center justify-center relative overflow-hidden rounded-3xl border-4 ${isLight?'border-uv/18 bg-gradient-to-br from-pink/8 to-uv/8':'border-uv/38 animate-pulse-uv'}`}>
                {!isLight&&<div className="absolute inset-0 bg-gradient-to-tr from-uv/45 to-cyan/35 animate-ooze opacity-55"/>}
                <SunsetArchiveLogo size={isLight?130:150} placement="modal-visual"/>
              </div>

              {/* Config panel */}
              <div className="space-y-6 md:space-y-7">
                <div>
                  <h2 className={`modal-h2 font-serif italic leading-[0.9] ${modalText}`}>{selectedItem.name}</h2>
                  <p className={`font-bold text-sm md:text-base mt-2 ${isLight?'text-abyss/52':'text-white/52'}`}>{selectedItem.tagline}</p>
                </div>
                {/* Lore */}
                <div className={`p-4 md:p-5 rounded-2xl border-2 ${isLight?'border-uv/13 bg-uv/3':'border-uv/13 bg-uv/7'}`}>
                  <p className="font-black text-[9px] uppercase tracking-[0.38em] mb-2" style={{color:GAME_COLORS[selectedItem.game]}}>Lore - {selectedItem.loreDetail}</p>
                  <p className="font-serif italic text-sm md:text-base leading-relaxed opacity-78">{selectedItem.lore}</p>
                </div>
                {/* Customization options */}
                <div className="space-y-6 max-h-[32vh] overflow-y-auto custom-scroll pr-2">
                  {(CUSTOMIZATIONS[selectedItem.id]||[]).map(config=>{
                    let modBadge='';
                    if(config.type==='toggle'){modBadge='+$'+config.mod;}
                    else{const activeOpt=config.options&&config.options.find(o=>o.label===selectedOptions[config.key]);if(activeOpt&&activeOpt.mod>0)modBadge='+$'+activeOpt.mod;}
                    return(
                      <div key={config.key} className="space-y-3">
                        <label className={`font-black text-[10px] uppercase tracking-widest flex items-center gap-3 ${labelOpacity}`}>
                          {config.label}
                          {modBadge&&(<span className="font-black text-[10px] px-3 py-1 rounded-full border" style={{color:isLight?'#FF3366':'#A139C2',borderColor:isLight?'rgba(255,51,102,0.32)':'rgba(161,57,194,0.32)',background:isLight?'rgba(255,51,102,0.07)':'rgba(161,57,194,0.07)'}}>{modBadge}</span>)}
                        </label>
                        {config.type==='radio'&&(
                          <div className="flex flex-wrap gap-2 md:gap-3">
                            {config.options.map(opt=>(<button key={opt.label} onClick={()=>handleOptionChange(config.key,opt.label)} className={`border-[3px] rounded-2xl py-3 px-4 font-black text-[10px] uppercase tracking-widest transition-all duration-300 ${radioActive(selectedOptions[config.key]===opt.label)}`}>{opt.label}{opt.mod>0&&<span className="ml-1 opacity-48">+${opt.mod}</span>}</button>))}
                          </div>
                        )}
                        {config.type==='dropdown'&&(
                          <select value={selectedOptions[config.key]||config.default} onChange={e=>handleOptionChange(config.key,e.target.value)} className={`w-full border-[3px] rounded-2xl p-4 font-black text-xs uppercase tracking-wider outline-none cursor-pointer transition-all font-sans ${isLight?'border-abyss/14 text-abyss bg-white hover:border-sunset/48 focus:border-sunset':'border-white/10 text-white hover:border-uv/48 focus:border-uv'}`} style={{background:isLight?'#ffffff':'rgba(26,0,64,0.92)',fontFamily:'Space Grotesk,sans-serif'}}>
                            {config.options.map(opt=>(<option key={opt.label} value={opt.label} style={{background:isLight?'#FAF8FF':'#1A0040',color:isLight?'#1A0040':'#FAF8FF'}}>{opt.label}{opt.mod>0?` (+$${opt.mod})`:''}</option>))}
                          </select>
                        )}
                        {config.type==='toggle'&&(
                          <button onClick={()=>handleOptionChange(config.key,!selectedOptions[config.key])} className={`flex items-center gap-4 border-[3px] rounded-2xl py-4 px-6 font-black text-[10px] uppercase tracking-widest transition-all duration-300 ${toggleActive(selectedOptions[config.key])}`}>
                            <div className={`relative w-10 h-5 rounded-full border-2 border-current flex-shrink-0 transition-colors ${selectedOptions[config.key]?(isLight?'bg-sunset/18':'bg-uv/28'):(isLight?'bg-abyss/6':'bg-white/8')}`}>
                              <div className={`absolute top-0.5 w-3.5 h-3.5 rounded-full bg-current transition-transform duration-300 ${selectedOptions[config.key]?'translate-x-[18px]':'translate-x-0.5'}`}/>
                            </div>
                            {selectedOptions[config.key]?'Added - ':'Add - '}{config.label}
                          </button>
                        )}
                      </div>
                    );
                  })}
                  {(!CUSTOMIZATIONS[selectedItem.id]||CUSTOMIZATIONS[selectedItem.id].length===0)&&(<p className={`font-bold text-xs uppercase tracking-widest ${isLight?'text-abyss/32':'text-white/32'}`}>Standard configuration; no customizations available.</p>)}
                </div>
                {/* Registry Value */}
                <div className={`p-6 md:p-10 rounded-[28px] flex justify-between items-end border-4 ${isLight?'border-sunset/18 bg-sunset/4':'border-uv/38 bg-uv/5'}`}>
                  <div>
                    <span className={`font-serif italic text-xl md:text-3xl block ${isLight?'text-abyss/52':'opacity-58'}`}>Registry Value</span>
                    <span className={`font-black text-[10px] uppercase tracking-widest mt-1 block ${isLight?'text-sunset/55':'text-uv/55'}`}>Base ${selectedItem.price} + options</span>
                  </div>
                  <span className="registry-value font-serif italic leading-none" style={{color:isLight?'#FF3366':'#A139C2'}}>${calculatePrice()}</span>
                </div>
                {/* CTA */}
                <div className="flex gap-4 md:gap-6">
                  <button onClick={()=>{setCartCount(c=>c+1);setSelectedItem(null);}} className="btn-sunset flex-grow py-5 md:py-7 rounded-full font-black text-xs uppercase tracking-widest shadow-2xl flex items-center justify-center gap-2"><IconCart s={14}/>Secure Item</button>
                  <button onClick={()=>setSelectedItem(null)} className={`px-8 md:px-12 font-black text-xs uppercase tracking-widest transition-opacity ${isLight?'text-abyss opacity-32 hover:opacity-65':'opacity-38 hover:opacity-100'}`}>Cancel</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══ FOOTER ══ */}

          <div className="col-span-full md:col-span-2 space-y-8 md:space-y-10">
            <div className="flex items-center gap-4 cursor-pointer" onClick={()=>goTo('home')}>
              <SunsetArchiveLogo size={52} placement="footer-seal"/>
              <span className="font-black text-2xl md:text-4xl tracking-tighter">endgame.archive</span>
            </div>
            <p className="font-black text-xs md:text-sm uppercase tracking-[0.28em]" style={{color:'#FF3366'}}>Elite Gaming Artifacts. Crafted in Huntsville, AL.</p>
            <p className="font-serif italic text-xl md:text-3xl opacity-45 leading-snug">"For the Player 2 who became Player 1.<br/>Setup reveals for the curated home."</p>
            <div className="space-y-3">
              <p className="font-black text-xs uppercase tracking-widest" style={{color:'#FF3366'}}>Huntsville, AL Studio - Node: Nominal</p>
              <div className="flex gap-6 opacity-55 font-black text-xs uppercase tracking-widest">
                <button onClick={()=>goTo('socials')} className="hover:text-uv transition-colors">TikTok</button>
                <button onClick={()=>goTo('socials')} className="hover:text-uv transition-colors">Instagram</button>
                <button onClick={()=>goTo('socials')} className="hover:text-uv transition-colors">Pinterest</button>
              </div>
            </div>
          </div>
          <div className="space-y-8">
            <h5 className="font-black text-xs uppercase tracking-[0.48em]" style={{color:'#FF3366'}}>Directory</h5>
            <ul className="font-bold text-lg md:text-xl space-y-4 opacity-55">
              {[
                {label:'Home',action:()=>goTo('home')},
                {label:'Our Story',action:()=>goTo('about')},
                {label:'Apparel',action:()=>navigateToShop('Apparel')},
                {label:'Sanctuary / Office',action:()=>navigateToShop('Sanctuary')},
                {label:'Home Goods',action:()=>navigateToShop('Home')},
                {label:"Lily's Corner",action:()=>navigateToShop("Lily's Corner")},
                {label:"Pets - Cerberus's Gate",action:()=>navigateToShop('Pets')},
                {label:'FAQ',action:()=>goTo('faq')},
                {label:'Socials and Contact',action:()=>goTo('socials')},
              ].map(({label,action})=>(<li key={label}><button onClick={action} className="flex items-center gap-2 hover:text-uv hover:translate-x-2 transition-all duration-200 text-left">{label}</button></li>))}
            </ul>
          </div>
          <div className="space-y-8">
            <div className="glass p-6 md:p-8 space-y-4">
              <p className="font-black text-xs uppercase tracking-widest" style={{color:'#FF3366'}}>Join the Registry</p>
              <input type="email" placeholder="your@email.com" className={`w-full p-4 rounded-xl border-2 text-sm font-bold outline-none focus:border-uv transition-all ${isLight?'bg-black/5 border-black/10 text-abyss placeholder-abyss/28':'bg-white/8 border-white/10 text-white placeholder-white/28'}`}/>

            <div className="space-y-3">
              <p className="font-black text-[9px] uppercase tracking-widest opacity-28">By Game Universe</p>
              <div className="flex flex-wrap gap-2">
                {Object.entries(GAME_COLORS).map(([game,color])=>(<button key={game} onClick={()=>navigateToShop('All',game)} className="px-3 py-1.5 rounded-full font-black text-[8px] uppercase tracking-wider border transition-all hover:scale-105" style={{borderColor:`${color}38`,color,background:`${color}10`}}>{game}</button>))}

            <span className="font-black text-[10px] tracking-widest uppercase opacity-18 block">c 2026 Archive Studio / Huntsville, AL</span>
          </div>
        </div>
      </footer>
    </div>
  );
};

root.render(<App/>);
